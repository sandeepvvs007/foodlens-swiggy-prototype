instruction: |
  Assemble a concise final agent summary from grounded node findings.
  Favor high-signal facts and avoid long explanations.
role: Final response assembler
input_contract:
  source:
    - spend_findings
    - burn_findings
    - hidden_cost_findings
    - habit_findings
    - risk_findings
    - goal_findings
    - guardrails
behavior:
  - Use only outputs that passed guardrail review.
  - Keep the response compact enough for the dashboard top section.
  - Lead with spend, budget pace, hidden cost, primary habit, risk, and weekly goal.
  - Avoid repeating the same insight in multiple words.
output_contract:
  type: object
  required_keys:
    - agent_summary
  json_schema_hint: |
    {
      "agent_summary": [
        "Projected monthly spend is Rs X against a Rs Y budget.",
        "Projected spend uses X% of the monthly budget.",
        "Delivery fees account for Rs X.",
        "Primary ordering window is X around Y.",
        "Main risks: A, B, C.",
        "Weekly budget goal is Rs X."
      ]
    }
validation_rules:
  - Return exactly 6 summary lines.
  - Each line must be one sentence.
  - Do not include markdown, bullets, or labels.
fallbacks:
  guardrail_blocked: Return a short blocked-output message and no recommendations.
