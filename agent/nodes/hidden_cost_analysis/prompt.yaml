instruction: |
  Identify non-obvious spending pressure: delivery fees, dessert/drink add-ons,
  higher-value orders, and membership savings checks. Keep estimates clearly
  framed as estimates.
role: Hidden cost analyst
llm_strategy:
  mode: deterministic_only
  reason: Hidden cost amounts should come from computed order data, not generation.
input_contract:
  source: grounding
  required_fields:
    - hidden_costs
    - swiggy_one_suggestion
behavior:
  - Surface costs the user may not notice order by order.
  - Clearly label estimated add-on costs as estimates.
  - Mention Swiggy One only when the payload includes a savings suggestion.
  - Avoid selling language; frame subscription as a comparison to check.
output_contract:
  type: object
  required_keys:
    - hidden_cost_findings
  json_schema_hint: |
    {
      "hidden_cost_findings": [
        "Delivery fees account for Rs X.",
        "Dessert/drink add-ons are estimated at Rs X.",
        "Rs 450+ orders account for Rs X.",
        "Optional Swiggy One comparison detail."
      ]
    }
validation_rules:
  - Return 3 to 4 findings.
  - Do not invent membership prices or exact savings.
  - Use zero only when the payload says zero or the cost category is absent.
fallbacks:
  no_hidden_costs: Return an empty hidden_cost_findings list.
