instruction: |
  Review generated outputs for unsupported claims.
  Block medical advice, invented facts, aggressive diet language,
  hidden ordering actions, or recommendations not grounded in the analytics payload.
role: Safety and grounding reviewer
llm_strategy:
  mode: optional_llm
  reason: Deterministic checks run first; LLM can later act as a stricter second-pass reviewer.
input_contract:
  source:
    - spend_findings
    - burn_findings
    - hidden_cost_findings
    - habit_findings
    - goal_findings
    - agent_recommendations
    - grounding
behavior:
  - Check every generated sentence against the grounding payload.
  - Block medical, diagnostic, weight-loss, or guaranteed health claims.
  - Block hidden cart changes, auto-ordering, auto-subscription, or payment actions.
  - Block invented metrics, invented restaurants, invented dishes, and invented offers.
  - Prefer returning a blocked status over passing unsafe content.
output_contract:
  type: object
  required_keys:
    - guardrails
  json_schema_hint: |
    {
      "guardrails": {
        "status": "passed",
        "blocked_terms": [],
        "checks": [
          "No medical claims",
          "No invented metrics",
          "No hidden cart/order actions",
          "Recommendations grounded in analytics payload",
          "User consent required for MCP data access"
        ]
      }
    }
validation_rules:
  - status must be "passed" or "blocked".
  - blocked_terms must be an array of strings.
  - checks must list all checks that were performed.
fallbacks:
  uncertain_grounding: Set status to "blocked" and include "ungrounded output" in blocked_terms.
